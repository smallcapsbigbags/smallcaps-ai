<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>smallcaps.ai — RNS Intelligence</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto+Mono:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#F6F8FA;
      --card:#FFFFFF;
      --border:#E5E7EB;
      --primary:#2563EB;
      --text:#111827;
      --muted:#6B7280;

      --pill-bg:#F3F4F6;

      --pos-text:#15803D;
      --pos-bg:#DCFCE7;

      --neg-text:#B91C1C;
      --neg-bg:#FEE2E2;

      --neu-text:#374151;
      --neu-bg:#F3F4F6;

      --r:4px;
      --topbar-h:56px;
      --maxw:1180px;

      --pad-2:12px;
      --gap:12px;

      --pill-h:22px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
      padding-top: var(--topbar-h);
    }

    a{color:inherit; text-decoration:none}
    button, input, select{font:inherit}

    .container{
      max-width:var(--maxw);
      margin:0 auto;
      padding:0 16px;
    }

    /* Header */
    .topbar{
      position:fixed;
      top:0; left:0; right:0;
      height:var(--topbar-h);
      background:#fff;
      border-bottom:1px solid var(--border);
      z-index:50;
    }
    .topbar-inner{
      height:100%;
      display:flex;
      align-items:center;
      gap:16px;
    }
    .logo{
      font-weight:800;
      letter-spacing:-0.01em;
      white-space:nowrap;
    }
    .brand-accent{
      color:var(--primary);
      font-weight:800;
    }
    .search{
      flex:1;
      display:flex;
      justify-content:center;
    }
    .search input{
      width:min(560px, 100%);
      background:#fff;
      border:1px solid var(--border);
      border-radius:var(--r);
      padding:8px 10px;
      outline:none;
      color:var(--text);
    }
    .search input::placeholder{color:var(--muted)}
    .nav{
      display:flex;
      gap:14px;
      white-space:nowrap;
      color:var(--muted);
      font-weight:600;
    }
    .nav a{
      padding:6px 6px;
      border-radius:var(--r);
    }
    .nav a.active{color:var(--text)}
    @media (max-width: 520px){
      .topbar-inner{ gap:10px; }
      .nav{ display:none; }
    }

    main{
      padding-top: 24px;
      padding-bottom:28px;
    }

    /* Tabs + controls row */
    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin:12px 0 10px;
      flex-wrap:wrap;
    }

    .tabs{
      display:flex;
      gap:16px;
      align-items:flex-end;
    }
    .tab{
      background:transparent;
      border:0;
      padding:8px 0;
      color:var(--muted);
      font-weight:700;
      cursor:pointer;
      position:relative;
    }
    .tab[aria-selected="true"]{ color:var(--text); }
    .tab[aria-selected="true"]::after{
      content:"";
      position:absolute;
      left:0; right:0; bottom:-6px;
      height:2px;
      background:var(--primary);
    }

    .sort{
      display:flex;
      align-items:center;
      gap:8px;
      color:var(--muted);
      font-weight:600;
    }
    .sort select{
      background:#fff;
      border:1px solid var(--border);
      border-radius:var(--r);
      padding:7px 10px;
      color:var(--text);
      outline:none;
    }

    /* Filter pills */
    .filters{
      display:flex;
      gap:8px;
      overflow:auto;
      padding:8px 0 10px;
      scrollbar-width:thin;
    }
    .pill{
      border:1px solid var(--border);
      background:var(--pill-bg);
      color:var(--text);
      border-radius:999px;
      padding:6px 10px;
      font-weight:700;
      font-size:12px;
      cursor:pointer;
      white-space:nowrap;
    }
    .pill[aria-pressed="true"]{
      background:var(--primary);
      border-color:var(--primary);
      color:#fff;
    }

    /* Section headers */
    .section-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin:40px 0 12px;
    }
    .section-left{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .section-title .label{
      font-size:12px;
      color:var(--muted);
      font-weight:800;
      letter-spacing:0.02em;
      white-space:nowrap;
    }
    .hi-count{
      font-size:12px;
      color:var(--muted);
      font-weight:700;
      white-space:nowrap;
    }

    /* Grid */
    .grid{
      display:grid;
      gap:var(--gap);
      grid-template-columns:1fr;
    }
    @media (min-width: 760px){
      .grid{ grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (min-width: 1120px){
      .grid{ grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    /* Cards */
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--r);
      padding:var(--pad-2);
      display:flex;
      flex-direction:column;
      gap:8px;
      min-height:152px;
      position:relative;

      /* injected by JS */
      --accent:var(--primary);
      --accent-w:2px;
    }

    /* Brand-blue left accent (thickness by materiality) */
    .card::before{
      content:"";
      position:absolute;
      left:-1px; top:-1px; bottom:-1px;
      width:var(--accent-w);
      background:var(--accent);
      border-top-left-radius:var(--r);
      border-bottom-left-radius:var(--r);
      pointer-events:none;
    }

    /* Watchlist indicator (no emoji): subtle inset ring + small corner tick */
    .card.watchlist{
      box-shadow: inset 0 0 0 1px rgba(37,99,235,.20);
    }
    .card.watchlist .watch-tick{ display:inline-block; }
    .watch-tick{
      display:none;
      position:absolute;
      right:8px;
      top:8px;
      width:8px;
      height:8px;
      border-right:2px solid rgba(37,99,235,.55);
      border-bottom:2px solid rgba(37,99,235,.55);
      transform: rotate(-45deg);
      opacity:.55;
      pointer-events:none;
    }

    /* Topline */
    .topline{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .ticker-left{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    /* Ticker always black */
    .ticker-btn{
      background:transparent;
      border:0;
      padding:0;
      margin:0;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      color:var(--text);
      font-family:"Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-weight:800;
      font-size:14.5px;
      letter-spacing:0.01em;
      line-height:1;
      flex:0 0 auto;
    }
    .ticker-btn:hover{ text-decoration:underline; text-decoration-thickness:2px; text-underline-offset:3px; }
    .ticker-btn:focus-visible{
      outline:2px solid rgba(37,99,235,.35);
      outline-offset:3px;
      border-radius:6px;
    }

    /* Materiality dots: count from materiality_score; colour from sentiment */
    .impact-dots{
      display:inline-flex;
      gap:4px;
      align-items:center;
      flex:0 0 auto;
    }
    .dot{
      width:8px;
      height:8px;
      border-radius:999px;
      background:var(--border);
    }
    .dot.filled{ background: var(--dot-color); }

    /* AIM punch: slightly larger extreme dots (sentiment_score 1 or 5) */
    .dot.extreme{
      width:9px;
      height:9px;
    }

    .top-pills{
      display:flex;
      align-items:center;
      gap:8px;
      flex:0 0 auto;
      justify-content:flex-end;
      min-width:0;
    }

    /* Pills */
    .sentiment, .event-pill, .risk-pill, .conf-pill{
      display:inline-flex;
      align-items:center;
      height:var(--pill-h);
      padding:0 9px;
      border-radius:999px;
      font-size:11px;
      line-height:1;
      white-space:nowrap;
    }

    .sentiment{ border:1px solid transparent; font-weight:800; }
    .sentiment.pos{ color:var(--pos-text); background:var(--pos-bg); border-color:rgba(21,128,61,.15); }
    .sentiment.neg{ color:var(--neg-text); background:var(--neg-bg); border-color:rgba(185,28,28,.15); }
    .sentiment.neu{ color:var(--neu-text); background:var(--neu-bg); border-color:rgba(55,65,81,.10); }

    /* Event category pill — brand blue */
    .event-pill{
      font-weight:800;
      background:#EFF6FF;
      border:1px solid rgba(37,99,235,.16);
      color:var(--primary);
    }

    /* Risk pill (only when flags exist): outline, not filled */
    .risk-pill{
      font-weight:800;
      background:transparent;
      border:1px solid rgba(185,28,28,.25);
      color:rgba(185,28,28,.92);
    }

    /* Low confidence indicator (quiet) */
    .conf-pill{
      font-weight:800;
      background:transparent;
      border:1px solid rgba(107,114,128,.22);
      color:rgba(107,114,128,.95);
    }

    .headline{
      margin-top:2px;
      font-weight:700;
      font-size:13px;
      line-height:1.3;
      color:var(--text);
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .signals{
      margin-top:2px;
      font-size:12.5px;
      line-height:1.45;
      color:var(--text);
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .signal-line{
      display:-webkit-box;
      -webkit-line-clamp:1;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    /* Italic forward-looking only */
    .forward-tone{
      font-size:12px;
      color:var(--muted);
      font-style:italic;
      display:-webkit-box;
      -webkit-line-clamp:1;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .card-footer{
      margin-top:auto;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding-top:4px;
      gap:10px;
      min-width:0;
    }
    .company{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      min-width:0;
      flex:1 1 auto;
      color:var(--muted);
      font-size:12px;
      font-weight:600;
    }

    .meta{
      display:flex;
      align-items:center;
      gap:0;
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
      flex:0 0 auto;
    }
    .timestamp{ color:var(--muted); }
    .view{
      color:var(--muted);
      font-weight:600;
      font-size:12px;
      white-space:nowrap;
      flex:0 0 auto;
    }
    .view:hover{
      color:var(--primary);
      text-decoration:underline;
    }

    /* Live dot */
    .live-dot{
      width:7px;
      height:7px;
      border-radius:999px;
      background:#16A34A;
      opacity:.42;
      flex:0 0 auto;
      margin-right:6px;
      animation: liveSoftPulse 2.4s ease-in-out infinite;
    }
    @keyframes liveSoftPulse{
      0%   { opacity:.16; }
      50%  { opacity:.55; }
      100% { opacity:.16; }
    }
    @media (prefers-reduced-motion: reduce){
      .live-dot{ animation:none; }
    }

    /* Gating */
    .gated{
      position:relative;
      overflow:hidden;
    }
    .gated .card{
      filter: blur(5px);
      pointer-events:none;
      user-select:none;
    }
    .gate-overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
      background:rgba(246,248,250,.72);
      border:1px solid transparent;
    }
    .gate-panel{
      width:min(440px, 100%);
      background:#fff;
      border:1px solid var(--border);
      border-radius:var(--r);
      padding:12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .gate-text{ min-width:0; }
    .gate-text .title{
      font-weight:800;
      font-size:13px;
      margin:0 0 2px;
      color:var(--text);
    }
    .gate-text .sub{
      margin:0;
      font-size:12px;
      color:var(--muted);
    }
    .btn{
      border:1px solid var(--primary);
      background:var(--primary);
      color:#fff;
      border-radius:var(--r);
      padding:8px 10px;
      font-weight:900;
      font-size:12px;
      cursor:pointer;
      white-space:nowrap;
    }

    .sr-only{
      position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); border:0;
    }

    /* MOBILE: deterministic two-row classification */
    @media (max-width: 640px){
      .topline{
        flex-direction:column;
        align-items:stretch;
        gap:6px;
      }
      .top-pills{
        justify-content:space-between;
        gap:8px;
        flex-wrap:wrap;
      }
      .sentiment{ order:1; margin-left:auto; }
      .event-pill{ order:2; }
      .risk-pill{ order:3; }
      .conf-pill{ order:4; }
    }
  </style>
</head>

<body>
  <!-- HEADER -->
  <header class="topbar" role="banner">
    <div class="container topbar-inner">
      <div class="logo">smallcaps<span class="brand-accent">.ai</span></div>

      <div class="search" role="search">
        <input id="search" type="search" placeholder="Search ticker or company…" autocomplete="off" />
      </div>

      <nav class="nav" aria-label="Primary">
        <a href="#" class="active">Feed</a>
        <a href="#">Watchlist</a>
        <a href="#">Account</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <!-- HIGH IMPACT SECTION -->
    <div class="section-title">
      <div class="section-left">
        <div class="label">High Impact (≥7/10)</div>
        <span class="hi-count" id="hiCount">· 0</span>
      </div>
      <div class="meta">
        <span class="timestamp" id="hiUpdated">Updated just now</span>
      </div>
    </div>

    <section class="grid" id="highImpactGrid" aria-label="High Impact (materiality ≥ 7)"></section>

    <!-- TABS + SORT -->
    <div class="row" style="margin-top:18px;">
      <div class="tabs" role="tablist" aria-label="Feed tabs">
        <button class="tab" role="tab" id="tabHighlights" aria-selected="true" aria-controls="panelHighlights">Highlights</button>
        <button class="tab" role="tab" id="tabFull" aria-selected="false" aria-controls="panelFull">Full feed</button>
      </div>

      <div class="sort">
        <label for="sortSelect" class="sr-only">Sort</label>
        <select id="sortSelect">
          <option value="recent" selected>Most Recent</option>
          <option value="impact">Highest Impact</option>
        </select>
      </div>
    </div>

    <!-- FILTER PILLS -->
    <div class="filters" aria-label="Filters">
      <button class="pill" data-filter="Negative" aria-pressed="false">Negative</button>
      <button class="pill" data-filter="Positive" aria-pressed="false">Positive</button>
      <button class="pill" data-filter="Neutral" aria-pressed="false">Neutral</button>
      <button class="pill" data-filter="Impact>=3" aria-pressed="false">Materiality ≥5</button>
      <button class="pill" data-filter="Results" aria-pressed="false">Results</button>
      <button class="pill" data-filter="Fundraise" aria-pressed="false">Fundraise</button>
      <button class="pill" data-filter="Contract" aria-pressed="false">Contract</button>
    </div>

    <!-- FEED PANELS -->
    <section id="panelHighlights" role="tabpanel" aria-labelledby="tabHighlights">
      <div class="grid" id="highlightsGrid" aria-label="Highlights feed"></div>
    </section>

    <section id="panelFull" role="tabpanel" aria-labelledby="tabFull" hidden>
      <div id="allWrapper">
        <div class="grid" id="allGrid" aria-label="Full feed"></div>
      </div>
    </section>
  </main>

  <script>
    // ---- State ----
    const state = {
      userPlan: "free",                   // "free" | "pro"
      activeFilters: new Set(),
      sort: "recent",
      query: "",
      watchlist: new Set(["CRDL","RKT"]),  // demo
    };

    // ---- Mock PROMPT-SCHEMA data (replace with your API) ----
    // Note: published_at and rns_url come from ingestion, not from the AI prompt schema.
    const rns = [
      {
        ticker:"CRDL",
        company_name:"Cordel Group plc",
        announcement_date:"2026-03-01",
        announcement_type:"contract",
        is_amended:false,
        currency:"GBP",
        sentiment:"positive",
        sentiment_score:4,
        headline:"£12m multi-year contract secured",
        key_metric:"£12m",
        vs_guidance:null,
        management_tone:"confident in outlook",
        has_comparatives:false,
        signal_balance:{positive:2, negative:0, neutral:0},
        signals:[
          {level:"positive", label:"Contract £12m secured, 3 years", value:"12", category:"contract"},
          {level:"positive", label:"Counterparty named; recurring profile", value:null, category:"contract"}
        ],
        flags:[],
        materiality_score:8,
        category:"contract",
        confidence:"high",

        // ingestion-only (not from AI)
        id:"1",
        published_at: minutesAgoISO(12),
        rns_url:"#",
      },
      {
        ticker:"MNO",
        company_name:"Mono Group plc",
        announcement_date:"2026-03-01",
        announcement_type:"placing",
        is_amended:false,
        currency:"GBP",
        sentiment:"high_negative",
        sentiment_score:1,
        headline:"Placing with going concern warning",
        key_metric:"£6.0m",
        vs_guidance:null,
        management_tone:"material uncertainty",
        has_comparatives:false,
        signal_balance:{positive:0, negative:2, neutral:0},
        signals:[
          {level:"negative", label:"Placing £6.0m, discount stated", value:"6.0", category:"dilution"},
          {level:"negative", label:"Going concern flagged explicitly", value:null, category:"balance_sheet"}
        ],
        flags:["going_concern"],
        materiality_score:10,
        category:"balance_sheet",
        confidence:"high",

        id:"2",
        published_at: minutesAgoISO(38),
        rns_url:"#",
      },
      {
        ticker:"RKT",
        company_name:"Rocket Fintech plc",
        announcement_date:"2026-03-01",
        announcement_type:"results",
        is_amended:false,
        currency:"GBP",
        sentiment:"negative",
        sentiment_score:2,
        headline:"Guidance cut 8–10%",
        key_metric:"8–10%",
        vs_guidance:"guidance cut",
        management_tone:"cautious on outlook",
        has_comparatives:true,
        signal_balance:{positive:0, negative:1, neutral:1},
        signals:[
          {level:"negative", label:"FY revenue guidance cut 8–10%", value:"8–10", category:"earnings"},
          {level:"neutral", label:"Cost actions announced; timing unclear", value:null, category:"operations"}
        ],
        flags:[],
        materiality_score:7,
        category:"earnings",
        confidence:"medium",

        id:"3",
        published_at: minutesAgoISO(22),
        rns_url:"#",
      },
      {
        ticker:"ZED",
        company_name:"Zed Systems plc",
        announcement_date:"2026-03-01",
        announcement_type:"other",
        is_amended:false,
        currency:"GBP",
        sentiment:"neutral",
        sentiment_score:3,
        headline:"No material investor signal",
        key_metric:null,
        vs_guidance:null,
        management_tone:null,
        has_comparatives:false,
        signal_balance:{positive:0, negative:0, neutral:1},
        signals:[
          {level:"neutral", label:"No material investor signal", value:null, category:"general"}
        ],
        flags:[],
        materiality_score:2,
        category:"general",
        confidence:"low",

        id:"4",
        published_at: minutesAgoISO(3),
        rns_url:"#",
      }
    ];

    function minutesAgoISO(m){ return new Date(Date.now() - m*60*1000).toISOString(); }

    function fmtRelative(iso){
      const t = new Date(iso).getTime();
      const now = Date.now();
      const diffMin = Math.floor((now - t) / 60000);
      if (diffMin < 1) return "just now";
      if (diffMin < 60) return `${diffMin}m ago`;
      const diffHr = Math.floor(diffMin / 60);
      if (diffHr < 24) return `${diffHr}h ago`;
      const d = new Date(iso);
      return d.toLocaleDateString(undefined, { day:"2-digit", month:"short" });
    }

    function isWithinMinutes(iso, mins){
      const t = new Date(iso).getTime();
      return (Date.now() - t) <= mins * 60 * 1000;
    }

    function esc(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    // ---- Schema mappings (prompt-aligned) ----
    function sentimentPillText(sentiment){
      if (sentiment === "high_positive" || sentiment === "positive") return "Positive";
      if (sentiment === "high_negative" || sentiment === "negative") return "Negative";
      return "Neutral";
    }

    function sentimentClass(sentiment){
      if (sentiment === "high_positive" || sentiment === "positive") return "pos";
      if (sentiment === "high_negative" || sentiment === "negative") return "neg";
      return "neu";
    }

    function eventLabel(item){
      const t = item.announcement_type;
      if (t === "placing") return "Fundraise";
      if (t === "results") return "Results";
      if (t === "contract") return "Contract";
      if (t === "director_dealing") return "Insider";
      if (t === "acquisition") return "M&A";
      if (t === "regulatory") return "Regulatory";
      if (t === "trading_update") return "Trading";
      return "Other";
    }

    // Dots colour strictly from sentiment (fixed)
    function dotColorFixed(sentiment){
      if (sentiment === "positive" || sentiment === "high_positive") return "#16A34A";
      if (sentiment === "negative" || sentiment === "high_negative") return "#DC2626";
      return "#64748B";
    }

    // Accent thickness from materiality (still brand blue)
    function accentWidth(materiality){
      const m = Number(materiality || 1);
      return (m >= 7) ? "4px" : "2px";
    }

    // materiality_score (1–10) -> filled dots (1–5)
    function filledDots(materiality){
      const m = Math.max(1, Math.min(10, Number(materiality || 1)));
      if (m <= 2) return 1;
      if (m <= 4) return 2;
      if (m <= 6) return 3;
      if (m <= 8) return 4;
      return 5;
    }

    // AIM punch on extremes (sentiment_score 1 or 5)
    function dotsHTML(materiality, sentimentScore, dotHex, tooltip){
      const n = filledDots(materiality);
      const extreme = (Number(sentimentScore) === 1 || Number(sentimentScore) === 5) ? "extreme" : "";

      let out = `<span class="impact-dots" title="${esc(tooltip)}" aria-label="${esc(tooltip)}">`;
      for (let i=1;i<=5;i++){
        const filled = i <= n ? "filled" : "";
        out += `<span class="dot ${filled} ${filled ? extreme : ""}" style="${filled ? `--dot-color:${dotHex}` : ""}"></span>`;
      }
      out += `</span>`;
      return out;
    }

    function hasRisk(flags){
      return Array.isArray(flags) && flags.length > 0;
    }

    function isNoSignal(item){
      const s0 = item?.signals?.[0]?.label || "";
      return String(s0) === "No material investor signal";
    }

    function confidenceLabel(conf){
      if (conf === "low") return "low";
      return null;
    }

    // Filters
    function matchFilters(item){
      const f = state.activeFilters;

      const sentiments = ["Negative","Positive","Neutral"].filter(x => f.has(x));
      const categories = ["Results","Fundraise","Contract"].filter(x => f.has(x));
      const mat5 = f.has("Impact>=3"); // label says Materiality ≥5

      const sText = sentimentPillText(item.sentiment);
      const eText = eventLabel(item);

      if (mat5 && Number(item.materiality_score || 0) < 5) return false;
      if (sentiments.length && !sentiments.includes(sText)) return false;
      if (categories.length && !categories.includes(eText)) return false;

      return true;
    }

    function matchQuery(item){
      const q = state.query.trim().toLowerCase();
      if (!q) return true;
      return (
        item.ticker.toLowerCase().includes(q) ||
        item.company_name.toLowerCase().includes(q) ||
        (item.headline || "").toLowerCase().includes(q)
      );
    }

    // Impact sort: materiality desc, directionality desc, then recency
    function directionalityWeight(sentimentScore){
      const s = Number(sentimentScore || 3);
      return Math.abs(s - 3);
    }

    function sortItems(items){
      if (state.sort === "impact"){
        return [...items].sort((a,b) =>
          (Number(b.materiality_score) - Number(a.materiality_score)) ||
          (directionalityWeight(b.sentiment_score) - directionalityWeight(a.sentiment_score)) ||
          (new Date(b.published_at) - new Date(a.published_at))
        );
      }
      return [...items].sort((a,b) => new Date(b.published_at) - new Date(a.published_at));
    }

    function cardHTML(item){
      const isWatch = state.watchlist.has(item.ticker);
      const noSignal = isNoSignal(item);

      const aW = accentWidth(item.materiality_score);
      const dotHex = dotColorFixed(noSignal ? "neutral" : item.sentiment);

      const m = Math.max(1, Math.min(10, Number(item.materiality_score || 1)));
      const dotsN = filledDots(m);
      const dotTip = `Materiality ${m}/10 (${dotsN}/5 dots)`;

      const liveDot = isWithinMinutes(item.published_at, 15)
        ? `<span class="live-dot" aria-hidden="true"></span>`
        : "";

      const tone = item.management_tone
        ? `<div class="forward-tone">${esc(item.management_tone)}</div>`
        : "";

      // Signals: 2 by default; 3rd only if materiality >= 8 OR flags exist
      const showThird = (Number(item.materiality_score || 0) >= 8) || hasRisk(item.flags);
      const maxLines = showThird ? 3 : 2;

      const sigLines = (item.signals || []).slice(0, maxLines).map(s => (
        `<div class="signal-line">${esc(s.label)}</div>`
      )).join("");

      const risk = (!noSignal && hasRisk(item.flags))
        ? `<span class="risk-pill" title="${esc(item.flags.join(", "))}">Risk</span>`
        : "";

      const conf = (!noSignal && confidenceLabel(item.confidence))
        ? `<span class="conf-pill" title="AI extraction confidence low">Low conf</span>`
        : "";

      return `
        <article class="card ${isWatch ? "watchlist" : ""}"
          style="--accent:var(--primary); --accent-w:${aW}"
          data-id="${esc(item.id)}" data-ticker="${esc(item.ticker)}">

          <span class="watch-tick" aria-hidden="true"></span>

          <div class="card-top">
            <div class="topline">
              <div class="ticker-left">
                <button class="ticker-btn"
                  type="button"
                  aria-label="Toggle watchlist for ${esc(item.ticker)}"
                  aria-pressed="${isWatch ? "true" : "false"}"
                  data-watch-ticker="${esc(item.ticker)}">
                  ${esc(item.ticker)}
                </button>

                ${dotsHTML(item.materiality_score, item.sentiment_score, dotHex, dotTip)}
              </div>

              <div class="top-pills">
                <span class="sentiment ${sentimentClass(noSignal ? "neutral" : item.sentiment)}">${esc(sentimentPillText(noSignal ? "neutral" : item.sentiment))}</span>
                <span class="event-pill">${esc(eventLabel(item))}</span>
                ${risk}
                ${conf}
              </div>
            </div>
          </div>

          <div class="headline">${esc(item.headline)}</div>

          <div class="signals">
            ${sigLines || `<div class="signal-line">No material investor signal</div>`}
          </div>

          ${tone}

          <div class="card-footer">
            <span class="company" title="${esc(item.company_name)}">${esc(item.company_name)}</span>

            <div class="meta">
              ${liveDot}
              <span class="timestamp" data-time="${esc(item.published_at)}">${fmtRelative(item.published_at)}</span>
              <span style="padding:0 6px; color:transparent;">·</span>
              <a class="view" href="${esc(item.rns_url)}" target="_blank" rel="noopener">View RNS ↗</a>
            </div>
          </div>
        </article>
      `;
    }

    // Only updates relative time strings + live dot state without full re-render
    function updateTimes(){
      document.querySelectorAll("[data-time]").forEach(el => {
        const iso = el.getAttribute("data-time");
        el.textContent = fmtRelative(iso);

        const meta = el.closest(".meta");
        if (!meta) return;
        const hasDot = !!meta.querySelector(".live-dot");
        const shouldDot = isWithinMinutes(iso, 15);

        if (shouldDot && !hasDot){
          const dot = document.createElement("span");
          dot.className = "live-dot";
          dot.setAttribute("aria-hidden","true");
          meta.insertBefore(dot, meta.firstChild);
        } else if (!shouldDot && hasDot){
          meta.querySelector(".live-dot").remove();
        }
      });
    }

    function bindUpgrade(){
      const btn = document.getElementById("upgradeBtn");
      if (!btn) return;
      btn.onclick = () => alert("Route to /account/upgrade (no modal).");
    }

    // Watchlist toggle via ticker click (ring + corner tick; no clutter)
    function bindTickerWatch(){
      document.querySelectorAll("[data-watch-ticker]").forEach(btn => {
        const ticker = btn.getAttribute("data-watch-ticker");
        btn.onclick = (e) => {
          e.preventDefault();
          if (state.watchlist.has(ticker)) state.watchlist.delete(ticker);
          else state.watchlist.add(ticker);
          render();
        };
      });
    }

    function render(){
      const itemsBase = rns
        .filter(matchQuery)
        .filter(matchFilters);

      // High Impact section: materiality >= 7
      const hiAll = sortItems(itemsBase).filter(x => Number(x.materiality_score || 0) >= 7);
      const hi = hiAll.slice(0,6);

      document.getElementById("highImpactGrid").innerHTML = hi.map(cardHTML).join("");
      document.getElementById("hiCount").textContent = `· ${hi.length}`;

      // Highlights
      const highlights = sortItems(itemsBase).slice(0,9);
      document.getElementById("highlightsGrid").innerHTML = highlights.map(cardHTML).join("");

      // Full feed (gated for free users)
      const allItems = sortItems(itemsBase);
      const allGrid = document.getElementById("allGrid");

      if (state.userPlan === "free"){
        const first = allItems.slice(0,3);
        const rest = allItems.slice(3);

        allGrid.innerHTML =
          first.map(cardHTML).join("") +
          (rest.length ? `
            <div class="gated" style="grid-column:1 / -1; border-radius:var(--r);">
              <div class="grid">
                ${rest.map(cardHTML).join("")}
              </div>
              <div class="gate-overlay">
                <div class="gate-panel" role="region" aria-label="Upgrade gate">
                  <div class="gate-text">
                    <p class="title">Unlock full-day feed</p>
                    <p class="sub">See every announcement from today, plus watchlist tools.</p>
                  </div>
                  <button class="btn" type="button" id="upgradeBtn">Upgrade</button>
                </div>
              </div>
            </div>
          ` : "");
      } else {
        allGrid.innerHTML = allItems.map(cardHTML).join("");
      }

      bindUpgrade();
      bindTickerWatch();
      updateTimes();
    }

    // Tabs
    const tabHighlights = document.getElementById("tabHighlights");
    const tabFull = document.getElementById("tabFull");
    const panelHighlights = document.getElementById("panelHighlights");
    const panelFull = document.getElementById("panelFull");

    function setTab(which){
      const isHighlights = which === "highlights";
      tabHighlights.setAttribute("aria-selected", String(isHighlights));
      tabFull.setAttribute("aria-selected", String(!isHighlights));
      panelHighlights.hidden = !isHighlights;
      panelFull.hidden = isHighlights;
    }

    tabHighlights.addEventListener("click", () => setTab("highlights"));
    tabFull.addEventListener("click", () => setTab("full"));

    // Filters
    document.querySelectorAll(".pill").forEach(btn => {
      btn.addEventListener("click", () => {
        const f = btn.getAttribute("data-filter");
        if (state.activeFilters.has(f)) state.activeFilters.delete(f);
        else state.activeFilters.add(f);
        btn.setAttribute("aria-pressed", String(state.activeFilters.has(f)));
        render();
      });
    });

    // Sort
    document.getElementById("sortSelect").addEventListener("change", (e) => {
      state.sort = e.target.value;
      render();
    });

    // Search
    const search = document.getElementById("search");
    let t = null;
    search.addEventListener("input", (e) => {
      clearTimeout(t);
      t = setTimeout(() => {
        state.query = e.target.value || "";
        render();
      }, 120);
    });

    // Initial render
    render();

    // Lightweight time updater
    setInterval(() => updateTimes(), 30_000);
  </script>
</body>
</html>
