<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>smallcaps.ai — RNS Intelligence</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Roboto+Mono:wght@500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg0:#0E101B;
      --bg1:#171A25;

      --text:#EAF1FA;
      --muted:rgba(234,241,250,.62);

      --primary:#4DCEF4;
      --pos:#22C55E;
      --neg:#EF4444;
      --neu:#94A3B8;

      --amber:#F59E0B;
      --danger:#F97316;
      --redhot:#FB7185;

      --pos-bg:rgba(34,197,94,.12);
      --neg-bg:rgba(239,68,68,.12);
      --neu-bg:rgba(148,163,184,.10);

      --r:14px;
      --topbar-h:66px;
      --maxw:1180px;

      --pad:14px;
      --gap:14px;
      --pill-h:24px;

      --glow: 0 0 0 1px rgba(255,255,255,.05), 0 14px 34px rgba(0,0,0,.45);
      --glow-cyan: 0 0 0 1px rgba(77,206,244,.22), 0 18px 46px rgba(0,0,0,.55);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      padding-top: var(--topbar-h);

      background:
        radial-gradient(1200px 700px at 55% 28%, rgba(77,206,244,.08), transparent 58%),
        radial-gradient(900px 600px at 22% 18%, rgba(255,255,255,.05), transparent 60%),
        radial-gradient(900px 650px at 86% 18%, rgba(255,255,255,.04), transparent 64%),
        radial-gradient(1400px 900px at 50% 110%, rgba(0,0,0,.35), transparent 60%),
        linear-gradient(180deg, var(--bg1), var(--bg0));
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background: radial-gradient(1200px 900px at 50% 40%, transparent 55%, rgba(0,0,0,.55) 100%);
      opacity:.55;
    }

    a{color:inherit; text-decoration:none}
    button, input, select{font:inherit}

    .container{ max-width:var(--maxw); margin:0 auto; padding:0 18px; }

    /* Header */
    .topbar{
      position:fixed; top:0; left:0; right:0;
      height:var(--topbar-h);
      z-index:50;
      background: linear-gradient(180deg, rgba(10,16,26,.82), rgba(10,16,26,.58));
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom:1px solid rgba(255,255,255,.06);
      box-shadow: 0 10px 40px rgba(0,0,0,.28);
    }
    .topbar-inner{
      height:100%;
      display:flex;
      align-items:center;
      gap:16px;
    }
    .logo{
      font-weight:900;
      letter-spacing:-0.02em;
      white-space:nowrap;
      font-size:22px;
    }
    .brand-accent{ color:var(--primary); font-weight:900; }

    .search{ flex:1; display:flex; justify-content:center; }
    .search input{
      width:min(640px, 100%);
      background: rgba(8,12,20,.55);
      border:1px solid rgba(255,255,255,.08);
      border-radius:999px;
      padding:11px 14px;
      outline:none;
      color:var(--text);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03);
    }
    .search input::placeholder{color:rgba(234,241,250,.42)}
    .search input:focus{
      border-color: rgba(77,206,244,.32);
      box-shadow: inset 0 0 0 1px rgba(77,206,244,.20), 0 0 0 4px rgba(77,206,244,.10);
    }

    .nav{
      display:flex;
      gap:14px;
      white-space:nowrap;
      color:rgba(234,241,250,.62);
      font-weight:800;
      font-size:13px;
    }
    .nav a{
      padding:8px 10px;
      border-radius:999px;
      border:1px solid transparent;
    }
    .nav a.active{
      color:var(--text);
      border-color: rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
    }
    @media (max-width: 520px){ .nav{ display:none; } }

    main{ padding-top: 22px; padding-bottom:34px; position:relative; z-index:1; }

    /* Grid */
    .grid{ display:grid; gap:var(--gap); grid-template-columns:1fr; }
    @media (min-width: 760px){ .grid{ grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (min-width: 1120px){ .grid{ grid-template-columns: repeat(3, minmax(0, 1fr)); } }

    /* Cards */
    .card{
      background: linear-gradient(180deg, rgba(12,18,30,.74), rgba(10,16,26,.62));
      border:1px solid rgba(255,255,255,.07);
      border-radius:var(--r);
      padding:var(--pad);
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height:176px;
      position:relative;
      box-shadow: var(--glow);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      --accent: var(--primary);
      --accent-w: 2px;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .card:hover{
      transform: translateY(-4px);
      border-color: rgba(255,255,255,.12);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.08),
        0 22px 60px rgba(0,0,0,.55);
    }
    .card::before{
      content:"";
      position:absolute;
      left:-1px; top:-1px; bottom:-1px;
      width:var(--accent-w);
      background: var(--accent);
      border-top-left-radius:var(--r);
      border-bottom-left-radius:var(--r);
      pointer-events:none;
    }
    .card.watchlist{ box-shadow: var(--glow-cyan); }
    .card.watchlist .watch-tick{ display:inline-block; }
    .watch-tick{
      display:none;
      position:absolute;
      right:12px;
      top:12px;
      width:10px;
      height:10px;
      border-right:2px solid rgba(77,206,244,.75);
      border-bottom:2px solid rgba(77,206,244,.75);
      transform: rotate(-45deg);
      opacity:.65;
      pointer-events:none;
    }

    .card.flash{ animation: flashCard .6s ease; }
    @keyframes flashCard{
      0%{ box-shadow: 0 0 0 1px rgba(77,206,244,.45), 0 0 28px rgba(77,206,244,.45); }
      100%{ box-shadow: 0 0 0 1px rgba(255,255,255,.06), 0 18px 46px rgba(0,0,0,.55); }
    }
    .card.new{ animation: newCardFlash 1.2s ease; }
    @keyframes newCardFlash{
      0%{
        transform: translateY(-2px);
        box-shadow: 0 0 0 1px rgba(77,206,244,.45), 0 0 30px rgba(77,206,244,.45);
      }
      100%{
        transform: translateY(0);
        box-shadow: 0 0 0 1px rgba(255,255,255,.06), 0 18px 46px rgba(0,0,0,.55);
      }
    }

    /* ✅ NEW: “meta header” row sits ABOVE headline (ticker + pills) */
    .metahead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }
    .ticker-left{ display:flex; align-items:center; gap:10px; min-width:0; }

    .ticker-btn{
      background:transparent;
      border:0;
      padding:0;
      margin:0;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      color:rgba(234,241,250,.92);
      font-family:"Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-weight:900;
      font-size:15px;               /* slightly stronger */
      letter-spacing:0.02em;
      line-height:1;
      flex:0 0 auto;
    }
    .ticker-btn:hover{ text-decoration:underline; text-decoration-thickness:2px; text-underline-offset:3px; }

    .impact-dots{ display:inline-flex; gap:5px; align-items:center; flex:0 0 auto; }
    .dot{
      width:8px; height:8px;
      border-radius:999px;
      background: rgba(255,255,255,.10);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.06);
    }
    .dot.filled{ background: var(--dot-color); box-shadow:none; }
    .dot.extreme{ width:12px; height:12px; }

    .top-pills{ display:flex; align-items:center; gap:8px; flex:0 0 auto; justify-content:flex-end; min-width:0; }

    .sentiment, .event-pill, .pulse-pill, .more-pill{
      display:inline-flex;
      align-items:center;
      height:var(--pill-h);
      padding:0 10px;
      border-radius:999px;
      font-size:11px;
      line-height:1;
      white-space:nowrap;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
      color: rgba(234,241,250,.78);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.02);
      font-weight:900;
    }
    .sentiment{ border-color: transparent; }
    .sentiment.pos{ color: rgba(34,197,94,.98); background: var(--pos-bg); border-color: rgba(34,197,94,.18); }
    .sentiment.neg{ color: rgba(239,68,68,.98); background: var(--neg-bg); border-color: rgba(239,68,68,.18); }
    .sentiment.neu{ color: rgba(148,163,184,.98); background: var(--neu-bg); border-color: rgba(148,163,184,.16); }

    .event-pill{
      background: rgba(77,206,244,.10);
      border-color: rgba(77,206,244,.22);
      color: rgba(77,206,244,.92);
      text-transform: capitalize;
    }

    /* Headline: second row, bold, clean */
    .headline{
      margin-top:0;
      font-weight:900;
      font-size:14px;
      line-height:1.28;
      color:var(--text);
      letter-spacing:-0.01em;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .signals{
      font-size:13px;
      line-height:1.55;
      letter-spacing:-0.005em;
      color: rgba(234,241,250,.86);
      display:flex;
      flex-direction:column;
      gap:6px;
      margin-top:0;
    }
    .signal-line{
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
      position:relative;
      padding-left:12px;
      font-weight:600;
    }
    .signal-line::before{
      content:"•";
      position:absolute;
      left:0; top:0;
      color: rgba(234,241,250,.34);
    }
    .forward-tone{
      font-size:12.5px;
      color: rgba(234,241,250,.54);
      font-style:italic;
      display:-webkit-box;
      -webkit-line-clamp:1;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .card-footer{
      margin-top:auto;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding-top:8px;
      gap:10px;
      min-width:0;
    }
    .company{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      min-width:0;
      flex:1 1 auto;
      color: rgba(234,241,250,.52);
      font-size:12px;
      font-weight:700;
    }
    .meta{
      display:flex;
      align-items:center;
      gap:0;
      color: rgba(234,241,250,.52);
      font-size:12px;
      white-space:nowrap;
      flex:0 0 auto;
    }
    .view{
      color: rgba(234,241,250,.56);
      font-weight:800;
      font-size:12px;
      white-space:nowrap;
      flex:0 0 auto;
    }
    .view:hover{ color: rgba(77,206,244,.92); text-decoration:underline; }

    .live-dot{
      width:7px; height:7px;
      border-radius:999px;
      background: var(--primary);
      opacity:.40;
      flex:0 0 auto;
      margin-right:7px;
      animation: liveSoftPulse 2.4s ease-in-out infinite;
      box-shadow: 0 0 18px rgba(77,206,244,.22);
    }
    @keyframes liveSoftPulse{
      0%   { opacity:.16; }
      50%  { opacity:.55; }
      100% { opacity:.16; }
    }

    @media (prefers-reduced-motion: reduce){
      .live-dot, .card.new, .card.flash{ animation:none; }
      .card{ transition:none; }
    }

    /* MARKET PULSE */
    .pulse-wrap{
      margin: 6px 0 12px;
      padding: 16px;
      border-radius: var(--r);
      border: 1px solid rgba(255,255,255,.07);
      background: linear-gradient(180deg, rgba(12,18,30,.55), rgba(10,16,26,.40));
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: var(--glow);
      position:relative;
      overflow:hidden;
    }
    .pulse-wrap::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), transparent 26%),
        radial-gradient(900px 260px at 30% 0%, rgba(77,206,244,.08), transparent 65%),
        radial-gradient(900px 260px at 70% 0%, rgba(255,255,255,.05), transparent 70%);
      opacity:.9;
      mix-blend-mode: screen;
    }
    .pulse-inner{ position:relative; z-index:1; }

    .pulse-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    /* ✅ date/time aligned LEFT (in pulse-left) */
    .pulse-left{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .pulse-title{
      font-weight:900;
      letter-spacing:0.10em;
      text-transform:uppercase;
      font-size:12px;
      color: rgba(234,241,250,.62);
    }
    .live-badge{
      display:inline-flex;
      gap:8px;
      align-items:center;
      font-weight:900;
      font-size:11px;
      color: rgba(77,206,244,.92);
      letter-spacing:0.04em;
      text-transform:uppercase;
      opacity:.95;
    }
    .live-badge i{
      width:7px; height:7px;
      border-radius:999px;
      background: rgba(77,206,244,.95);
      box-shadow: 0 0 16px rgba(77,206,244,.22);
      opacity:.55;
      display:inline-block;
      animation: liveSoftPulse 2.4s ease-in-out infinite;
    }

    .pulse-right{
      display:flex;
      align-items:flex-end;
      gap:12px;
      flex-wrap:wrap;
      justify-content:flex-end;
      margin-left:auto;
    }
    .pulse-sub{
      font-size:12px;
      font-weight:800;
      color: rgba(234,241,250,.52);
      white-space:nowrap;
    }
    .pulse-time{
      font-size:12px;
      font-weight:900;
      color:rgba(234,241,250,.55);
      letter-spacing:.02em;
      white-space:nowrap;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.02);
    }

    .count-heat{
      font-weight:900;
      padding: 2px 8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
      color: rgba(234,241,250,.72);
      font-family:"Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }
    .count-heat.cyan{ color: rgba(77,206,244,.92); border-color: rgba(77,206,244,.22); background: rgba(77,206,244,.08); }
    .count-heat.amber{ color: rgba(245,158,11,.92); border-color: rgba(245,158,11,.22); background: rgba(245,158,11,.10); }
    .count-heat.orange{ color: rgba(249,115,22,.92); border-color: rgba(249,115,22,.22); background: rgba(249,115,22,.10); }
    .count-heat.red{ color: rgba(251,113,133,.95); border-color: rgba(251,113,133,.25); background: rgba(251,113,133,.10); }

    .pulse-bar{
      height:6px;
      border-radius:999px;
      overflow:hidden;
      display:flex;
      margin: 0 0 12px;
      background:rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.06);
    }
    .pulse-neg{ background: var(--neg); opacity:.95; }
    .pulse-neu{ background: var(--neu); opacity:.75; }
    .pulse-pos{ background: var(--pos); opacity:.95; }

    .pulse-row{
      display:flex;
      gap:10px;
      overflow:auto;
      padding:2px 0;
      scrollbar-width:thin;
      align-items:center;
    }
    .pulse-pill{
      height: 36px;
      padding: 0 14px;
      font-size:12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
      color: rgba(234,241,250,.82);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.02);
      display:inline-flex;
      align-items:center;
      gap:8px;
      user-select:none;
      cursor:pointer;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
      flex: 0 0 auto;
      font-weight:900;
    }
    .pulse-pill:hover{ transform: translateY(-1px); }
    .pulse-pill[aria-pressed="true"]{
      background: rgba(77,206,244,.16);
      border-color: rgba(77,206,244,.30);
      color: var(--text);
      box-shadow: inset 0 0 0 1px rgba(77,206,244,.18), 0 0 18px rgba(77,206,244,.14);
    }
    .pill-count{
      font-family:"Roboto Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-weight:900;
      font-size:12px;
      color: rgba(234,241,250,.72);
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
    }
    .pulse-pill.neg{ border-color: rgba(239,68,68,.22); }
    .pulse-pill.neg .pill-count{ background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.18); }
    .pulse-pill.pos{ border-color: rgba(34,197,94,.22); }
    .pulse-pill.pos .pill-count{ background: rgba(34,197,94,.12); border-color: rgba(34,197,94,.18); }
    .pulse-pill.neu{ border-color: rgba(148,163,184,.20); }
    .pulse-pill.neu .pill-count{ background: rgba(148,163,184,.10); border-color: rgba(148,163,184,.16); }

    .more-pill{
      height:36px;
      padding:0 14px;
      font-size:12px;
      border-radius:999px;
      cursor:pointer;
      user-select:none;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
      display:inline-flex;
      align-items:center;
      gap:8px;
      flex:0 0 auto;
      color: rgba(234,241,250,.82);
    }
    .more-pill:hover{ transform: translateY(-1px); }
    .more-pill[aria-expanded="true"]{
      background: rgba(77,206,244,.14);
      border-color: rgba(77,206,244,.26);
      box-shadow: inset 0 0 0 1px rgba(77,206,244,.16), 0 0 18px rgba(77,206,244,.12);
    }
    .chev{ display:inline-block; transform: translateY(-1px); opacity:.85; }

    /* Drawer */
    .drawer{
      margin-top:12px;
      border-top:1px solid rgba(255,255,255,.06);
      padding-top:12px;
      display:none;
    }
    .drawer.open{ display:block; }
    .drawer-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }
    .drawer-title{
      font-weight:900;
      font-size:12px;
      letter-spacing:.10em;
      text-transform:uppercase;
      color: rgba(234,241,250,.55);
    }
    .drawer-actions{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .link-btn{
      background:transparent;
      border:0;
      color: rgba(77,206,244,.92);
      font-weight:900;
      font-size:12px;
      cursor:pointer;
      padding:6px 8px;
      border-radius:999px;
    }
    .link-btn:hover{ text-decoration:underline; text-underline-offset:3px; }

    .drawer-grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap:10px;
    }
    @media (min-width: 760px){
      .drawer-grid{ grid-template-columns: repeat(4, minmax(0, 1fr)); }
    }

    .cat-pill{
      height:36px;
      padding:0 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
      color: rgba(234,241,250,.82);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      cursor:pointer;
      font-weight:900;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
      user-select:none;
    }
    .cat-pill:hover{ transform: translateY(-1px); }
    .cat-pill[aria-pressed="true"]{
      background: rgba(77,206,244,.16);
      border-color: rgba(77,206,244,.30);
      box-shadow: inset 0 0 0 1px rgba(77,206,244,.18), 0 0 18px rgba(77,206,244,.12);
    }
    .cat-pill .pill-count{ flex:0 0 auto; }

    /* Feed title */
    .feed-title{
      margin: 18px 0 10px;
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      gap:10px;
      flex-wrap:wrap;
    }
    .feed-title .label{
      font-size:12px;
      color:rgba(234,241,250,.62);
      font-weight:900;
      letter-spacing:0.10em;
      text-transform:uppercase;
      white-space:nowrap;
    }
    .sort select{
      background: rgba(8,12,20,.45);
      border:1px solid rgba(255,255,255,.08);
      border-radius:999px;
      padding:9px 12px;
      color:var(--text);
      outline:none;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03);
    }

    .sr-only{
      position:absolute; width:1px; height:1px; padding:0; margin:-1px;
      overflow:hidden; clip:rect(0,0,0,0); border:0;
    }

    @media (max-width: 640px){
      .signal-line{ -webkit-line-clamp:1; }
      .pulse-pill, .more-pill, .cat-pill{ height: 34px; }
      .pulse-time{ padding:5px 9px; }
      .drawer-grid{ grid-template-columns: 1fr; }
      .metahead{ gap:10px; }
    }
  </style>
</head>

<body>
  <!-- HEADER -->
  <header class="topbar" role="banner">
    <div class="container topbar-inner">
      <div class="logo">smallcaps<span class="brand-accent">.ai</span></div>

      <div class="search" role="search">
        <input id="search" type="search" placeholder="Search ticker, company, headline, facts…" autocomplete="off" />
      </div>

      <nav class="nav" aria-label="Primary">
        <a href="#" class="active">Feed</a>
        <a href="#">Watchlist</a>
        <a href="#">Account</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <!-- MARKET PULSE -->
    <section class="pulse-wrap" aria-label="Market pulse">
      <div class="pulse-inner">
        <div class="pulse-top">
          <div class="pulse-left">
            <div class="pulse-title">Market Pulse</div>
            <div class="live-badge" aria-label="Live"><i aria-hidden="true"></i> Live</div>
            <div class="pulse-time" id="pulseTime">—</div>
          </div>

          <div class="pulse-right">
            <div class="pulse-sub" id="pulseSummary">0 announcements today</div>
          </div>
        </div>

        <div class="pulse-bar" aria-label="Sentiment distribution">
          <div class="pulse-neg" id="pulseNeg" style="flex:1"></div>
          <div class="pulse-neu" id="pulseNeu" style="flex:1"></div>
          <div class="pulse-pos" id="pulsePos" style="flex:1"></div>
        </div>

        <div class="pulse-row" id="pulseRow" aria-label="Pulse filters"></div>

        <div class="drawer" id="filterDrawer" role="region" aria-label="More filters" aria-hidden="true">
          <div class="drawer-head">
            <div class="drawer-title">Categories</div>
            <div class="drawer-actions">
              <button class="link-btn" type="button" id="clearCatsBtn">Clear</button>
              <button class="link-btn" type="button" id="closeDrawerBtn">Close</button>
            </div>
          </div>
          <div class="drawer-grid" id="drawerGrid"></div>
        </div>
      </div>
    </section>

    <!-- MAIN FEED -->
    <div class="feed-title">
      <div>
        <div class="label">Main feed</div>
        <!-- removed “All announcements” -->
      </div>

      <div class="sort">
        <label for="sortSelect" class="sr-only">Sort</label>
        <select id="sortSelect">
          <option value="recent" selected>Most Recent</option>
          <option value="impact">Highest Impact</option>
        </select>
      </div>
    </div>

    <section class="grid" id="mainFeedGrid" aria-label="Main feed"></section>
  </main>

  <script>
    const state = {
      activeSentiment: new Set(), // Negative/Positive/Neutral
      activeImpact: new Set(),    // High impact
      activeCats: new Set(),      // earnings/dilution/...
      sort: "recent",
      watchlist: new Set(["SCE","CRDL","IHC"]),
      drawerOpen: false,
    };

    let newestSeen = null;

    const rns = [
      {
        id:"sce-1",
        ticker:"SCE",
        company_name:"Surface Transforms plc",
        sentiment:"high_negative",
        sentiment_score:1,
        headline:"Major customer contract lost",
        headline_short:"Major customer lost (GM)",
        management_tone:"intend to immediately engage corporate restructuring advisers",
        key_facts:[
          "GM represented £15.3m of FY 2025 revenue",
          "Customer concentration was 84% of revenue",
          "Supply re-sourced from 31 March 2026"
        ],
        category:"contract",
        impact:"high",
        materiality_score:10,
        published_at: minutesAgoISO(12),
        rns_url:"#"
      },
      {
        id:"crdl-1",
        ticker:"CRDL",
        company_name:"Cordel Group PLC",
        sentiment:"positive",
        sentiment_score:4,
        headline:"USA contract upgrade",
        headline_short:"US contract upgraded; SaaS extended",
        management_tone:"back on track for the board's full year target",
        key_facts:[
          "Expected to deliver in excess of US$600k in 2026",
          "Moves to fixed monthly SaaS fee model",
          "Enterprise access for up to 200 users"
        ],
        category:"contract",
        impact:"medium",
        materiality_score:6,
        published_at: minutesAgoISO(24),
        rns_url:"#"
      },
      {
        id:"ihc-1",
        ticker:"IHC",
        company_name:"Inspiration Healthcare Group plc",
        sentiment:"positive",
        sentiment_score:4,
        headline:"NHS framework renewed; ranked No.1",
        headline_short:"NHS framework renewed (4y) + ranked No.1",
        management_tone:null,
        key_facts:[
          "Re-appointed under new four-year framework",
          "Ranked No.1 neonatal ventilator supplier (2025/26)"
        ],
        category:"contract",
        impact:"medium",
        materiality_score:6,
        published_at: minutesAgoISO(40),
        rns_url:"#"
      },
      {
        id:"rkt-1",
        ticker:"RKT",
        company_name:"Rocket Fintech plc",
        sentiment:"negative",
        sentiment_score:2,
        headline:"Guidance cut 8–10%",
        headline_short:"Guidance cut 8–10%",
        management_tone:"cautious on outlook",
        key_facts:[
          "FY revenue guidance reduced by 8–10%",
          "Cost actions announced; timing unclear"
        ],
        category:"earnings",
        impact:"high",
        materiality_score:7,
        published_at: minutesAgoISO(58),
        rns_url:"#"
      },
      {
        id:"zed-1",
        ticker:"ZED",
        company_name:"Zed Systems plc",
        sentiment:"neutral",
        sentiment_score:3,
        headline:"No material investor signal",
        headline_short:"No material investor signal",
        management_tone:null,
        key_facts:["No material investor signal"],
        category:"general",
        impact:"low",
        materiality_score:2,
        published_at: minutesAgoISO(4),
        rns_url:"#"
      }
    ];

    function minutesAgoISO(m){ return new Date(Date.now() - m*60*1000).toISOString(); }

    function fmtRelative(iso){
      const t = new Date(iso).getTime();
      const now = Date.now();
      const diffMin = Math.floor((now - t) / 60000);
      if (diffMin < 1) return "just now";
      if (diffMin < 60) return `${diffMin}m ago`;
      const diffHr = Math.floor(diffMin / 60);
      if (diffHr < 24) return `${diffHr}h ago`;
      const d = new Date(iso);
      return d.toLocaleDateString(undefined, { day:"2-digit", month:"short" });
    }

    function isWithinMinutes(iso, mins){
      const t = new Date(iso).getTime();
      return (Date.now() - t) <= mins * 60 * 1000;
    }

    function esc(str){
      return String(str ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function sentimentPillText(sentiment){
      if (sentiment === "high_positive" || sentiment === "positive") return "Positive";
      if (sentiment === "high_negative" || sentiment === "negative") return "Negative";
      return "Neutral";
    }
    function sentimentClass(sentiment){
      if (sentiment === "high_positive" || sentiment === "positive") return "pos";
      if (sentiment === "high_negative" || sentiment === "negative") return "neg";
      return "neu";
    }

    function dotColorFixed(sentiment){
      const css = getComputedStyle(document.documentElement);
      const pos = css.getPropertyValue("--pos").trim() || "#22C55E";
      const neg = css.getPropertyValue("--neg").trim() || "#EF4444";
      const neu = css.getPropertyValue("--neu").trim() || "#94A3B8";
      if (sentiment === "positive" || sentiment === "high_positive") return pos;
      if (sentiment === "negative" || sentiment === "high_negative") return neg;
      return neu;
    }

    function accentWidth(materiality){
      const m = Number(materiality || 1);
      return (m >= 7) ? "4px" : "2px";
    }

    function filledDots(materiality){
      const m = Math.max(1, Math.min(10, Number(materiality || 1)));
      if (m <= 2) return 1;
      if (m <= 4) return 2;
      if (m <= 6) return 3;
      if (m <= 8) return 4;
      return 5;
    }

    function dotsHTML(materiality, sentimentScore, dotHex, tooltip){
      const n = filledDots(materiality);
      const extreme = (Number(sentimentScore) === 1 || Number(sentimentScore) === 5) ? "extreme" : "";
      let out = `<span class="impact-dots" title="${esc(tooltip)}" aria-label="${esc(tooltip)}">`;
      for (let i=1;i<=5;i++){
        const filled = i <= n ? "filled" : "";
        out += `<span class="dot ${filled} ${filled ? extreme : ""}" style="${filled ? `--dot-color:${dotHex}` : ""}"></span>`;
      }
      out += `</span>`;
      return out;
    }

    function accentColorFor(item){
      const css = getComputedStyle(document.documentElement);
      const pos = css.getPropertyValue("--pos").trim() || "#22C55E";
      const neg = css.getPropertyValue("--neg").trim() || "#EF4444";
      const neu = css.getPropertyValue("--neu").trim() || "#94A3B8";
      const primary = css.getPropertyValue("--primary").trim() || "#4DCEF4";
      if (item.sentiment === "high_positive" || item.sentiment === "positive") return pos;
      if (item.sentiment === "high_negative" || item.sentiment === "negative") return neg;
      if (item.sentiment === "neutral") return neu;
      return primary;
    }

    function sortItems(items){
      if (state.sort === "impact"){
        return [...items].sort((a,b) =>
          (Number(b.materiality_score) - Number(a.materiality_score)) ||
          (Math.abs(Number(b.sentiment_score||3)-3) - Math.abs(Number(a.sentiment_score||3)-3)) ||
          (new Date(b.published_at) - new Date(a.published_at))
        );
      }
      return [...items].sort((a,b) => new Date(b.published_at) - new Date(a.published_at));
    }

    const PULSE_PILLS = [
      {key:"High impact", type:"impact"},
      {key:"Negative", type:"sentiment", cls:"neg"},
      {key:"Positive", type:"sentiment", cls:"pos"},
      {key:"Neutral", type:"sentiment", cls:"neu"},
    ];

    const CATEGORY_FILTERS = [
      {key:"earnings", label:"Earnings"},
      {key:"dilution", label:"Dilution"},
      {key:"balance_sheet", label:"Balance sheet"},
      {key:"contract", label:"Contract"},
      {key:"m_and_a", label:"M&A"},
      {key:"insider_activity", label:"Insider"},
      {key:"operations", label:"Operations"},
      {key:"general", label:"Other"},
    ];

    function pulseCounts(items){
      const counts = {};
      PULSE_PILLS.forEach(p => counts[p.key] = 0);
      CATEGORY_FILTERS.forEach(c => counts[c.key] = 0);

      items.forEach(item => {
        if (Number(item.materiality_score || 0) >= 7) counts["High impact"] += 1;
        const s = sentimentPillText(item.sentiment);
        if (counts[s] !== undefined) counts[s] += 1;
        const c = item.category || "general";
        if (counts[c] !== undefined) counts[c] += 1;
      });

      return counts;
    }

    function renderPulseBar(items){
      const neg = items.filter(x => Number(x.sentiment_score || 3) <= 2).length;
      const pos = items.filter(x => Number(x.sentiment_score || 3) >= 4).length;
      const neu = Math.max(0, items.length - neg - pos);

      document.getElementById("pulseNeg").style.flex = String(neg || 0.0001);
      document.getElementById("pulseNeu").style.flex = String(neu || 0.0001);
      document.getElementById("pulsePos").style.flex = String(pos || 0.0001);
    }

    function updatePulseTime(){
      const now = new Date();
      const date = now.toLocaleDateString("en-GB", { weekday:"short", day:"numeric", month:"short" });
      const time = now.toLocaleTimeString("en-GB", { hour:"2-digit", minute:"2-digit" });
      document.getElementById("pulseTime").textContent = `${date} · ${time} London`;
    }

    function heatClass(total){
      if (total >= 40) return "red";
      if (total >= 30) return "orange";
      if (total >= 20) return "amber";
      if (total >= 12) return "cyan";
      return "";
    }

    function setDrawer(open){
      state.drawerOpen = open;
      const drawer = document.getElementById("filterDrawer");
      const btn = document.getElementById("moreBtn");
      drawer.classList.toggle("open", open);
      drawer.setAttribute("aria-hidden", String(!open));
      btn.setAttribute("aria-expanded", String(open));
      btn.querySelector(".chev").textContent = open ? "▴" : "▾";
    }

    function renderPulse(items){
      const counts = pulseCounts(items);
      const total = items.length;

      const hi = counts["High impact"] || 0;
      const neg = counts["Negative"] || 0;
      const pos = counts["Positive"] || 0;

      const heat = heatClass(total);
      const totalHTML = `<span class="count-heat ${heat}">${total}</span>`;
      document.getElementById("pulseSummary").innerHTML =
        `${totalHTML} announcements today · ${hi} high impact · ${neg} negative · ${pos} positive`;

      renderPulseBar(items);
      updatePulseTime();

      const row = document.getElementById("pulseRow");
      row.innerHTML = `
        ${PULSE_PILLS.map(p => {
          const pressed =
            (p.type === "impact" && state.activeImpact.has(p.key)) ||
            (p.type === "sentiment" && state.activeSentiment.has(p.key));
          const extra = p.cls ? ` ${p.cls}` : "";
          return `
            <button class="pulse-pill${extra}" type="button"
              data-pulse="${esc(p.key)}" data-type="${esc(p.type)}"
              aria-pressed="${pressed ? "true" : "false"}">
              <span>${esc(p.key)}</span>
              <span class="pill-count">${counts[p.key] ?? 0}</span>
            </button>
          `;
        }).join("")}
        <button class="more-pill" id="moreBtn" type="button" aria-expanded="${state.drawerOpen ? "true" : "false"}">
          More filters <span class="chev">${state.drawerOpen ? "▴" : "▾"}</span>
        </button>
      `;

      row.querySelectorAll("[data-pulse]").forEach(btn => {
        btn.onclick = () => {
          const key = btn.getAttribute("data-pulse");
          const type = btn.getAttribute("data-type");

          if (type === "impact"){
            if (state.activeImpact.has(key)) state.activeImpact.delete(key);
            else state.activeImpact.add(key);
          } else if (type === "sentiment"){
            if (state.activeSentiment.has(key)) state.activeSentiment.delete(key);
            else state.activeSentiment.add(key);
          }
          render();
        };
      });

      document.getElementById("moreBtn").onclick = () => setDrawer(!state.drawerOpen);

      const dg = document.getElementById("drawerGrid");
      dg.innerHTML = CATEGORY_FILTERS.map(c => {
        const pressed = state.activeCats.has(c.key);
        return `
          <button class="cat-pill" type="button"
            data-cat="${esc(c.key)}"
            aria-pressed="${pressed ? "true" : "false"}">
            <span>${esc(c.label)}</span>
            <span class="pill-count">${counts[c.key] ?? 0}</span>
          </button>
        `;
      }).join("");

      dg.querySelectorAll("[data-cat]").forEach(btn => {
        btn.onclick = () => {
          const key = btn.getAttribute("data-cat");
          if (state.activeCats.has(key)) state.activeCats.delete(key);
          else state.activeCats.add(key);
          render();
          setDrawer(true);
        };
      });

      document.getElementById("clearCatsBtn").onclick = () => {
        state.activeCats.clear();
        render();
        setDrawer(true);
      };
      document.getElementById("closeDrawerBtn").onclick = () => setDrawer(false);

      setDrawer(state.drawerOpen);
    }

    function matchPulse(item){
      if (state.activeImpact.size > 0 && Number(item.materiality_score || 0) < 7) return false;

      if (state.activeSentiment.size > 0){
        const s = sentimentPillText(item.sentiment);
        if (!state.activeSentiment.has(s)) return false;
      }

      if (state.activeCats.size > 0){
        const c = String(item.category || "general");
        if (!state.activeCats.has(c)) return false;
      }

      return true;
    }

    function cardHTML(item, newestId){
      const isWatch = state.watchlist.has(item.ticker);
      const isNew = (newestId && item.id === newestId);

      const aW = accentWidth(item.materiality_score);
      const accent = accentColorFor(item);
      const dotHex = dotColorFixed(item.sentiment);

      const m = Math.max(1, Math.min(10, Number(item.materiality_score || 1)));
      const dotsN = filledDots(m);
      const dotTip = `Materiality ${m}/10 (${dotsN}/5 dots)`;

      const liveDot = isWithinMinutes(item.published_at, 15)
        ? `<span class="live-dot" aria-hidden="true"></span>`
        : "";

      const facts = Array.isArray(item.key_facts) ? item.key_facts : [];
      const maxFacts = (Number(item.materiality_score||0) >= 6) ? 3 : 2;
      const factsShown = facts.slice(0, maxFacts);
      const factLines = factsShown.map((t) => `<div class="signal-line">${esc(t)}</div>`).join("");

      const tone = item.management_tone ? `<div class="forward-tone">${esc(item.management_tone)}</div>` : "";

      return `
        <article class="card ${isWatch ? "watchlist" : ""} ${isNew ? "new" : ""}"
          style="--accent:${accent}; --accent-w:${aW}"
          data-id="${esc(item.id)}">

          <span class="watch-tick" aria-hidden="true"></span>

          <!-- ✅ meta header FIRST -->
          <div class="metahead">
            <div class="ticker-left">
              <button class="ticker-btn"
                type="button"
                aria-label="Toggle watchlist for ${esc(item.ticker)}"
                aria-pressed="${isWatch ? "true" : "false"}"
                data-watch-ticker="${esc(item.ticker)}">
                ${esc(item.ticker)}
              </button>

              ${dotsHTML(item.materiality_score, item.sentiment_score, dotHex, dotTip)}
            </div>

            <div class="top-pills">
              <span class="sentiment ${sentimentClass(item.sentiment)}">${esc(sentimentPillText(item.sentiment))}</span>
              <span class="event-pill">${esc(String(item.category || "general").replaceAll("_"," "))}</span>
            </div>
          </div>

          <!-- ✅ headline SECOND -->
          <div class="headline">${esc(item.headline_short || item.headline || "")}</div>

          <div class="signals">${factLines}</div>
          ${tone}

          <div class="card-footer">
            <span class="company" title="${esc(item.company_name)}">${esc(item.company_name)}</span>
            <div class="meta">
              ${liveDot}
              <span class="timestamp" data-time="${esc(item.published_at)}">${fmtRelative(item.published_at)}</span>
              <span style="padding:0 8px; color:transparent;">·</span>
              <a class="view" href="${esc(item.rns_url)}" target="_blank" rel="noopener">View RNS ↗</a>
            </div>
          </div>
        </article>
      `;
    }

    function bindTickerWatch(){
      document.querySelectorAll("[data-watch-ticker]").forEach(btn => {
        const ticker = btn.getAttribute("data-watch-ticker");
        btn.onclick = (e) => {
          e.preventDefault();
          const card = btn.closest(".card");
          if (card){
            card.classList.add("flash");
            setTimeout(()=>card.classList.remove("flash"),600);
          }
          if (state.watchlist.has(ticker)) state.watchlist.delete(ticker);
          else state.watchlist.add(ticker);
          render();
        };
      });
    }

    function updateTimes(){
      document.querySelectorAll("[data-time]").forEach(el => {
        const iso = el.getAttribute("data-time");
        el.textContent = fmtRelative(iso);
      });
      updatePulseTime();
    }

    function render(){
      const q = (document.getElementById("search")?.value || "").trim().toLowerCase();

      let items = [...rns];
      if (q){
        items = items.filter(it => {
          const hay = [it.ticker, it.company_name, it.headline, it.headline_short, ...(it.key_facts||[])]
            .join(" ")
            .toLowerCase();
          return hay.includes(q);
        });
      }

      renderPulse(items);

      const filtered = items.filter(matchPulse);
      const sorted = sortItems(filtered);

      const newestNow = sorted[0]?.id || null;
      const highlightId = (newestSeen && newestNow && newestNow !== newestSeen) ? newestNow : null;

      document.getElementById("mainFeedGrid").innerHTML =
        sorted.map(it => cardHTML(it, highlightId)).join("");

      newestSeen = newestNow;

      bindTickerWatch();
      updateTimes();
    }

    document.getElementById("sortSelect").addEventListener("change", (e) => {
      state.sort = e.target.value;
      render();
    });

    const search = document.getElementById("search");
    let tt = null;
    search.addEventListener("input", () => {
      clearTimeout(tt);
      tt = setTimeout(render, 120);
    });

    render();
    setInterval(updateTimes, 30_000);
    setInterval(updatePulseTime, 60_000);

    // Demo live inject (remove in prod)
    setTimeout(() => {
      rns.unshift({
        id:"new-1",
        ticker:"NEW",
        company_name:"Newco plc",
        sentiment:"positive",
        sentiment_score:4,
        headline:"Contract win £2m",
        headline_short:"Contract win £2m",
        management_tone:"confident in outlook",
        key_facts:["Contract value £2m","Duration 2 years","Counterparty named"],
        category:"contract",
        impact:"medium",
        materiality_score:6,
        published_at: new Date().toISOString(),
        rns_url:"#"
      });
      render();
    }, 5500);
  </script>
</body>
</html>
